version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: librarium-postgres

    restart: always

    environment:
      POSTGRES_USER: Chamo
      POSTGRES_PASSWORD: 4921
      POSTGRES_DB: librarium-db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: